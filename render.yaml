services:
  - type: web
    name: kpn-news-portal
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && CI=false npm run build && cd server && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: JWT_SECRET
        generateValue: true
