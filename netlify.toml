[build]
  base = "."
  command = "CI=false npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"

# Proxy /api/* to the Render backend so the DB & subscriptions work
# Replace "kpn-news-portal" below with your actual Render service name if different
[[redirects]]
  from = "/api/*"
  to = "https://kpn-news-portal.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — lets React Router handle all client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
